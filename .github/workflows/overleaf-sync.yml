name: Sync to Overleaf

on:
  push:
    branches:
      - main
    paths:
      - 'main.tex'
      - 'references.bib'
      - 'image/**'
      - '.github/workflows/overleaf-sync.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sync bundle
        run: |
          mkdir -p /tmp/overleaf-project
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='Showcase/' \
            --exclude='*.aux' \
            --exclude='*.bbl' \
            --exclude='*.blg' \
            --exclude='*.fdb_latexmk' \
            --exclude='*.fls' \
            --exclude='*.log' \
            --exclude='*.nav' \
            --exclude='*.out' \
            --exclude='*.pdf' \
            --exclude='*.snm' \
            --exclude='*.synctex.gz' \
            --exclude='*.toc' \
            ./ /tmp/overleaf-project/

      - name: Push to Overleaf
        working-directory: /tmp/overleaf-project
        env:
          OVERLEAF_GIT_URL: ${{ secrets.OVERLEAF_GIT_URL }}
          OVERLEAF_USERNAME: ${{ secrets.OVERLEAF_USERNAME }}
          OVERLEAF_GIT_TOKEN: ${{ secrets.OVERLEAF_GIT_TOKEN }}
          OVERLEAF_PASSWORD: ${{ secrets.OVERLEAF_PASSWORD }}
        run: |
          OVERLEAF_AUTH_TOKEN="${OVERLEAF_GIT_TOKEN:-$OVERLEAF_PASSWORD}"

          if [ -z "$OVERLEAF_GIT_URL" ] || [ -z "$OVERLEAF_USERNAME" ] || [ -z "$OVERLEAF_AUTH_TOKEN" ]; then
            echo "Missing required secrets: OVERLEAF_GIT_URL, OVERLEAF_USERNAME, and OVERLEAF_GIT_TOKEN (or OVERLEAF_PASSWORD)"
            exit 1
          fi

          cat > /tmp/overleaf-askpass.sh << 'EOF'
          #!/usr/bin/env sh
          case "$1" in
            *Username*) echo "$OVERLEAF_USERNAME" ;;
            *Password*) echo "$OVERLEAF_AUTH_TOKEN" ;;
            *) echo "" ;;
          esac
          EOF

          chmod +x /tmp/overleaf-askpass.sh

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "sync: ${GITHUB_SHA}" || echo "No changes to commit"

          git remote add overleaf "$OVERLEAF_GIT_URL"
          GIT_ASKPASS=/tmp/overleaf-askpass.sh GIT_TERMINAL_PROMPT=0 git push --force overleaf HEAD:master