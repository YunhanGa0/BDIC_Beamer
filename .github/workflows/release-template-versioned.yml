name: Release Template ZIP (Versioned)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (example: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+(\.[0-9]+)*([.-][0-9A-Za-z-]+)?$'; then
            echo "Invalid tag format: $TAG"
            echo "Use semantic style tags, e.g. v1.0.0 or v1.0.0-rc1"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build template bundle
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p dist/BDIC_Beamer_Template/image
          cp main.tex dist/BDIC_Beamer_Template/
          cp references.bib dist/BDIC_Beamer_Template/
          cp README.md dist/BDIC_Beamer_Template/
          cp -r image/. dist/BDIC_Beamer_Template/image/
          cd dist
          zip -r "BDIC_Beamer_Template_${TAG}.zip" BDIC_Beamer_Template

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ASSET="dist/BDIC_Beamer_Template_${TAG}.zip"
          TITLE="BDIC Beamer Template ${TAG}"
          NOTES="Versioned template release from commit ${GITHUB_SHA}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$TAG" "$ASSET" --title "$TITLE" --notes "$NOTES"
          fi